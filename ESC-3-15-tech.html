<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>飞鱼制作 - 词汇大转盘</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;600;800&display=swap');

    body{
      background: linear-gradient(135deg, #2d0a0a 0%, #000000 100%);
      color:#fff;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow-x:hidden;
    }

    /* ✅ 改：左侧按钮的字体（拼音更清楚，汉字也清晰） */
    .chinese-font{
      font-family: "Noto Sans SC", "Microsoft YaHei", Arial, Helvetica, sans-serif;
    }

    .wheel-outer{
      position:relative;
      width:100%;
      max-width:560px;
      aspect-ratio:1/1;
      margin:0 auto;
    }

    canvas{
      width:100%;
      height:100%;
      border-radius:50%;
      box-shadow: 0 0 60px rgba(0,0,0,0.9), 0 0 30px rgba(255,215,0,0.2);
      transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
      border: 6px solid #444;
      background:#111;
      will-change: transform;
    }

    /* 指针：在 12 点方向 */
    .pointer{
      position:absolute;
      top:-12px;
      left:50%;
      transform: translateX(-50%);
      width:48px;
      height:60px;
      background:#FFD700;
      clip-path: polygon(50% 100%, 0% 0%, 100% 0%);
      z-index:40;
      filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5));
    }

    .option-btn{
      transition: all .18s;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
      border-bottom-width:4px;
      letter-spacing: 0.5px; /* ✅ 拼音更好认 */
    }
    .option-btn:hover:not(:disabled){
      transform: translateY(-2px);
      filter: brightness(1.15);
    }
    .correct { background-color:#16a34a !important; border-color:#065f46 !important; animation:pulse .5s; }
    .wrong { background-color:#dc2626 !important; border-color:#7f1d1d !important; animation:shake .4s; }

    @keyframes shake{ 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
    @keyframes pulse{ 0%{transform:scale(1)} 50%{transform:scale(1.05)} 100%{transform:scale(1)} }

    .modal{ background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); }

    .layout{
      display:grid;
      grid-template-columns: 240px 1fr 240px;
      gap: 18px;
      align-items:center;
    }
    @media (max-width: 1024px){
      .layout{ grid-template-columns: 1fr; }
    }
  </style>
</head>

<body class="p-2 md:p-4">
  <div class="max-w-7xl mx-auto">

    <div class="flex justify-between items-center mb-6 bg-white/5 p-3 rounded-2xl border border-white/10">
      <div class="flex gap-4 md:gap-8 text-xs md:text-sm">
        <p>⏱️ <span id="timer" class="font-mono text-yellow-400">00:00</span></p>
        <p>🏆 得分: <span id="score" class="font-bold text-green-400">0</span></p>
      </div>
      <div class="flex gap-4 md:gap-8 text-xs md:text-sm items-center">
        <p>🎯 正确率: <span id="accuracy" class="text-blue-400">0%</span></p>
        <p>📈 进度: <span id="progress-text" class="text-purple-400">0/0</span></p>
      </div>
    </div>

    <div class="layout">

      <div id="options-container" class="flex flex-col gap-3">
        <div class="text-center lg:text-left mb-1 text-gray-400 text-[10px] uppercase font-bold tracking-widest">选择选项 Options</div>
        <button class="option-btn w-full py-3 px-4 rounded-xl text-xl bg-indigo-600 text-white font-bold chinese-font border-indigo-900 disabled:opacity-30" onclick="checkAnswer(0)">-</button>
        <button class="option-btn w-full py-3 px-4 rounded-xl text-xl bg-fuchsia-700 text-white font-bold chinese-font border-fuchsia-950 disabled:opacity-30" onclick="checkAnswer(1)">-</button>
        <button class="option-btn w-full py-3 px-4 rounded-xl text-xl bg-teal-700 text-white font-bold chinese-font border-teal-950 disabled:opacity-30" onclick="checkAnswer(2)">-</button>
        <button class="option-btn w-full py-3 px-4 rounded-xl text-xl bg-orange-600 text-white font-bold chinese-font border-orange-900 disabled:opacity-30" onclick="checkAnswer(3)">-</button>
      </div>

      <div class="flex flex-col items-center">
        <div class="wheel-outer">
          <div class="pointer"></div>
          <canvas id="wheel" width="700" height="700"></canvas>

          <button id="spin-btn"
            class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-24 h-24 bg-white text-black text-2xl font-black rounded-full shadow-[0_0_40px_rgba(255,255,255,0.4)] border-4 border-yellow-500 hover:scale-110 active:scale-95 transition-transform z-20">
            SPIN
          </button>
        </div>

        <div class="mt-8 text-center">
          <h1 class="text-3xl text-yellow-500 font-black tracking-tighter">飞鱼制作 - 词汇大转盘</h1>
          <p id="game-mode-tip" class="text-white/50 text-xs mt-2 font-medium tracking-widest uppercase italic">
            点击 SPIN 开始挑战
          </p>
        </div>
      </div>

      <div class="flex flex-col gap-3">
        <div class="text-center lg:text-right mb-1 text-gray-400 text-[10px] uppercase font-bold tracking-widest">提示 Hint</div>
        <div class="bg-white p-6 rounded-2xl shadow-2xl text-center border-4 border-yellow-500 flex flex-col justify-center min-h-[140px]">
          <h2 id="target-word" class="text-2xl md:text-3xl font-black text-red-700 break-words leading-tight">READY?</h2>
          <p id="target-sub" class="text-gray-400 text-xs mt-2 italic"></p>
        </div>
      </div>
    </div>

    <div class="mt-12 bg-black/40 h-4 rounded-full overflow-hidden border border-white/10 p-1">
      <div id="progress-bar" class="bg-gradient-to-r from-yellow-400 via-orange-500 to-red-600 h-full rounded-full transition-all duration-700 shadow-[0_0_10px_rgba(245,158,11,0.5)]" style="width:0%"></div>
    </div>
  </div>

  <div id="result-modal" class="fixed inset-0 modal hidden flex items-center justify-center p-4 z-50">
    <div class="bg-white text-black p-8 rounded-3xl max-w-sm w-full text-center shadow-2xl border-8 border-yellow-500">
      <h2 class="text-4xl font-black mb-4 text-red-600">挑战成功!</h2>
      <div class="space-y-3 mb-8 text-lg font-medium">
        <div class="flex justify-between border-b pb-2"><span>最终得分:</span> <span id="final-score" class="font-black">0</span></div>
        <div class="flex justify-between border-b pb-2"><span>正确率:</span> <span id="final-accuracy" class="font-black text-blue-600">0%</span></div>
        <div class="flex justify-between border-b pb-2"><span>总耗时:</span> <span id="final-time" class="font-black text-emerald-600">00:00</span></div>
      </div>
      <button onclick="location.reload()" class="w-full py-4 bg-black text-yellow-400 text-xl font-black rounded-2xl hover:bg-gray-800 transition shadow-xl">
        再来一局
      </button>
    </div>
  </div>

  <script>
    const vocabulary = [
      { ch: "打字",     py: "dǎ zì",               en: "type" },
      { ch: "收发邮件", py: "shōu fā yóu jiàn",   en: "send/receive mail" },
      { ch: "电子邮件", py: "diàn zǐ yóu jiàn",   en: "email" },
      { ch: "社交软件", py: "shè jiāo ruǎn jiàn",  en: "social apps" },
      { ch: "离不开",   py: "lí bù kāi",          en: "can't live without" },
      { ch: "不用",     py: "bú yòng",            en: "no need to" },
      { ch: "好处",     py: "hǎo chù",            en: "advantage" },
      { ch: "坏处",     py: "huài chù",           en: "disadvantage" },
      { ch: "视力",     py: "shì lì",             en: "eyesight" },
      { ch: "户外活动", py: "hù wài huó dòng",     en: "outdoor activities" },
      { ch: "方便",     py: "fāng biàn",          en: "convenient" },
      { ch: "今后",     py: "jīn hòu",            en: "from now on" },
    ];

    const MODES = [
      { wheelField: 'py', optionField: 'ch', boxField: 'en', tip: "看拼音 选汉字" },
      { wheelField: 'ch', optionField: 'py', boxField: 'en', tip: "看汉字 选拼音" },
      { wheelField: 'en', optionField: 'ch', boxField: 'py', tip: "看英文 选汉字" }
    ];

    let score = 0, totalAnswered = 0, correctCount = 0;
    let isSpinning = false, startTime = null, timerInterval = null;
    let usedIndices = new Set();
    let currentMode = MODES[0];
    let currentIndex = -1;
    let currentOptions = [];
    let currentRotation = 0;

    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');

    const spinBtn = document.getElementById('spin-btn');
    const targetWordEl = document.getElementById('target-word');
    const targetSubEl = document.getElementById('target-sub');
    const optionBtns = document.querySelectorAll('.option-btn');
    const tipEl = document.getElementById('game-mode-tip');

    function normDeg(d){
      return ((d % 360) + 360) % 360;
    }

    // ✅ Spin 落点对齐：指针在 12 点方向 = 270°
    function getIndexAtPointer(rotationDeg){
      const n = vocabulary.length;
      const step = 360 / n;
      const pointerAngle = normDeg(270 - normDeg(rotationDeg));
      const eps = 1e-6;
      return Math.floor((pointerAngle + eps) / step) % n;
    }

    function drawWheel(){
      const n = vocabulary.length;
      const radius = canvas.width / 2;
      const angleStep = (2 * Math.PI) / n;

      ctx.clearRect(0,0,canvas.width,canvas.height);

      vocabulary.forEach((item,i)=>{
        const start = i * angleStep;
        const end = start + angleStep;

        ctx.beginPath();
        ctx.moveTo(radius, radius);
        ctx.arc(radius, radius, radius, start, end);
        const hue = (i * 360 / n);
        ctx.fillStyle = `hsl(${hue}, 60%, 40%)`;
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,0.28)";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.save();
        ctx.translate(radius, radius);
        ctx.rotate(start + angleStep/2);
        ctx.textAlign = "right";
        ctx.fillStyle = "#fff";

        const text = item[currentMode.wheelField];
        ctx.font = text.length > 8 ? "bold 14px Arial" : (text.length > 4 ? "bold 18px Arial" : "bold 22px Arial");
        ctx.fillText(text, radius - 30, 8);
        ctx.restore();
      });

      ctx.beginPath();
      ctx.arc(radius, radius, 10, 0, Math.PI*2);
      ctx.fillStyle = "#FFD700";
      ctx.fill();
    }

    function startTimer(){
      startTime = Date.now();
      timerInterval = setInterval(()=>{
        const elapsed = Math.floor((Date.now()-startTime)/1000);
        document.getElementById('timer').innerText =
          `${Math.floor(elapsed/60).toString().padStart(2,'0')}:${(elapsed%60).toString().padStart(2,'0')}`;
      },1000);
    }

    function disableOptions(d){
      optionBtns.forEach(b=>b.disabled=d);
    }

    function updateStats(){
      document.getElementById('score').innerText = score;
      const acc = totalAnswered===0 ? 0 : Math.round((correctCount/totalAnswered)*100);
      document.getElementById('accuracy').innerText = acc + '%';
      document.getElementById('progress-text').innerText = `${usedIndices.size}/${vocabulary.length}`;
      document.getElementById('progress-bar').style.width = `${(usedIndices.size/vocabulary.length)*100}%`;
    }

    function showGameOver(){
      clearInterval(timerInterval);
      document.getElementById('final-score').innerText = score;
      document.getElementById('final-accuracy').innerText = document.getElementById('accuracy').innerText;
      document.getElementById('final-time').innerText = document.getElementById('timer').innerText;
      document.getElementById('result-modal').classList.remove('hidden');
    }

    function setupQuestion(){
      const w = vocabulary[currentIndex];
      targetWordEl.innerText = w[currentMode.boxField];
      targetSubEl.innerText = "根据转盘结果选择对应的项";

      const correct = w[currentMode.optionField];
      let opts = [correct];
      while(opts.length < 4){
        const r = vocabulary[Math.floor(Math.random()*vocabulary.length)][currentMode.optionField];
        if(!opts.includes(r)) opts.push(r);
      }
      currentOptions = opts.sort(()=>Math.random()-0.5);

      optionBtns.forEach((btn,i)=>{
        btn.innerText = currentOptions[i];
        btn.classList.remove('correct','wrong');
        btn.disabled = false;
      });
    }

    function checkAnswer(i){
      if(isSpinning) return;

      const selected = currentOptions[i];
      const correct = vocabulary[currentIndex][currentMode.optionField];

      totalAnswered++;
      disableOptions(true);

      if(selected === correct){
        correctCount++;
        score += 10;
        optionBtns[i].classList.add('correct');
        usedIndices.add(currentIndex);
      }else{
        optionBtns[i].classList.add('wrong');
        const ci = currentOptions.indexOf(correct);
        if(ci !== -1) optionBtns[ci].classList.add('correct');
      }

      updateStats();
      if(usedIndices.size >= vocabulary.length){
        setTimeout(showGameOver, 1200);
      }
    }

    spinBtn.addEventListener('click', ()=>{
      if(isSpinning) return;
      if(usedIndices.size >= vocabulary.length) return;

      currentMode = MODES[Math.floor(Math.random()*MODES.length)];
      tipEl.innerText = currentMode.tip;
      drawWheel();

      if(!startTime) startTimer();

      isSpinning = true;
      spinBtn.disabled = true;
      disableOptions(true);

      const extraRounds = 5 + Math.random()*2;
      const randomOffset = Math.random()*360;
      currentRotation = currentRotation + extraRounds*360 + randomOffset;

      canvas.style.transform = `rotate(${currentRotation}deg)`;

      setTimeout(()=>{
        isSpinning = false;
        spinBtn.disabled = false;

        let idx = getIndexAtPointer(currentRotation);
        if(usedIndices.has(idx)){
          const n = vocabulary.length;
          let k = 0;
          while(k < n && usedIndices.has(idx)){
            idx = (idx + 1) % n;
            k++;
          }
        }

        currentIndex = idx;
        setupQuestion();
      }, 4100);
    });

    window.onload = ()=>{
      document.getElementById('progress-text').innerText = `0/${vocabulary.length}`;
      drawWheel();
      disableOptions(true);
    };
  </script>
</body>
</html>
