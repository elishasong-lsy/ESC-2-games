<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESC_2_3_1拼图学中文 - Unit 1 Lesson 3</title>
    <!-- Tailwind CSS for high fidelity modern UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Modern scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        /* Active snapping feedback pulse */
        @keyframes pulse-green {
            0%, 100% { border-color: #10b981; box-shadow: 0 0 0 0px rgba(16, 185, 129, 0.7); }
            50% { border-color: #34d399; box-shadow: 0 0 12px 4px rgba(16, 185, 129, 0.4); }
        }
        .pulse-active {
            animation: pulse-green 1.5s infinite;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800 selection:bg-emerald-100 flex flex-col select-none">

    <!-- Header Section -->
    <header class="bg-white border-b border-slate-200 py-4 px-6 sticky top-0 z-30 shadow-sm">
        <div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-md shadow-emerald-200">
                    🧩
                </div>
                <div>
                    <h1 class="text-xl font-bold text-slate-900">煜龙拼图学中文</h1>
                    <p class="text-xs text-slate-500">Unit 1: Leisure 休闲 (单字精练模式)</p>
                </div>
            </div>

            <!-- Global Controls -->
            <div class="flex items-center gap-3">
                <!-- Difficulty Selection -->
                <div class="bg-slate-100 p-1 rounded-lg flex items-center gap-1 text-sm font-medium">
                    <button onclick="setDifficulty(2)" id="btn-diff-2" class="px-3 py-1 rounded-md transition-all">简单 (2x2)</button>
                    <button onclick="setDifficulty(3)" id="btn-diff-3" class="px-3 py-1 rounded-md transition-all bg-white text-slate-800 shadow-sm">标准 (3x3)</button>
                    <button onclick="setDifficulty(4)" id="btn-diff-4" class="px-3 py-1 rounded-md transition-all">挑战 (4x4)</button>
                </div>
                
                <!-- Reset Button -->
                <button onclick="resetCurrentLevel()" class="p-2 bg-slate-100 hover:bg-slate-200 rounded-lg text-slate-600 transition-colors" title="重新开始本关">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18"></path></svg>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Game Workspace (Split Left/Right) -->
    <main class="flex-1 max-w-6xl w-full mx-auto p-4 md:p-6 flex flex-col lg:flex-row gap-6 items-stretch">
        
        <!-- Left Column: Word Card & Completed Preview Reference -->
        <section class="lg:w-1/3 flex flex-col gap-4">
            
            <!-- Vocabulary Card -->
            <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm flex flex-col justify-between gap-6 relative overflow-hidden flex-1">
                <div class="absolute -right-8 -top-8 w-24 h-24 bg-emerald-50 rounded-full -z-0 opacity-50"></div>
                
                <div class="flex flex-col gap-4 relative z-10 flex-1">
                    <div class="flex items-start justify-between">
                        <div>
                            <span class="text-xs font-semibold tracking-wider text-emerald-600 uppercase">Unit 1 Lesson 3 单字</span>
                            <h2 class="text-3xl font-extrabold text-slate-900 mt-1" id="word-pinyin">piào</h2>
                        </div>
                        <!-- TTS Pronunciation Speaker Button -->
                        <button onclick="speakCurrentWord()" class="w-12 h-12 bg-emerald-50 hover:bg-emerald-100 active:scale-95 text-emerald-600 rounded-full flex items-center justify-center transition-all shadow-sm" title="朗读发音">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072M18.364 5.636a9 9 0 010 12.728M12 18.75V5.25L7.75 9.5H4.5v5h3.25L12 18.75z"></path></svg>
                        </button>
                    </div>

                    <!-- Visual Guide / Goal preview (Very helpful for young learners) -->
                    <div class="flex flex-col items-center gap-2 my-2">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">目标效果图 / Reference Card</span>
                        <div class="relative w-48 h-48 rounded-2xl overflow-hidden shadow-md border border-slate-200/60 bg-slate-100 p-1">
                            <!-- Realtime generated target thumbnail -->
                            <img id="word-preview-image" class="w-full h-full object-cover rounded-xl" alt="Preview Goal" />
                        </div>
                    </div>

                    <!-- Target Word Display in large friendly format -->
                    <div class="text-center">
                        <span class="text-5xl font-black text-slate-800 tracking-wide font-sans" id="word-chars">漂</span>
                    </div>

                    <!-- Definition -->
                    <div class="border-t border-slate-100 pt-3">
                        <h4 class="text-xs font-bold uppercase tracking-wider text-slate-400">英文释义 / Meaning</h4>
                        <p class="text-lg font-semibold text-slate-700 mt-0.5" id="word-meaning">pretty (part of 漂亮)</p>
                    </div>
                </div>

                <!-- Navigation between levels -->
                <div class="flex flex-col gap-3 relative z-10 pt-4 border-t border-slate-100">
                    <div class="flex justify-between items-center text-xs text-slate-400 font-medium">
                        <span>学习进度</span>
                        <span id="progress-text" class="text-slate-700 font-bold">1 / 13</span>
                    </div>
                    <!-- ProgressBar -->
                    <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden mb-1">
                        <div id="progress-bar" class="bg-emerald-500 h-full transition-all duration-300" style="width: 7.6%"></div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <button onclick="prevWord()" class="py-2.5 px-4 rounded-xl border border-slate-200 hover:bg-slate-50 text-slate-600 font-medium transition-colors text-sm flex items-center justify-center gap-1">
                            ← 上一个
                        </button>
                        <button onclick="nextWord()" class="py-2.5 px-4 rounded-xl bg-slate-900 hover:bg-slate-800 text-white font-medium transition-colors text-sm flex items-center justify-center gap-1 shadow-md">
                            下一个 →
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- Right Column: Interactive Snapping Workspace -->
        <section class="flex-1 flex flex-col bg-white border border-slate-200 p-6 rounded-3xl shadow-sm relative overflow-hidden">
            
            <!-- Confetti Particle Overlay -->
            <canvas id="confetti-canvas" class="absolute inset-0 pointer-events-none z-40 w-full h-full"></canvas>

            <div class="flex flex-col items-center gap-2 mb-4">
                <span class="text-xs font-bold uppercase tracking-widest text-slate-400 text-center">拼图工作区 / Puzzle Area</span>
                <p class="text-xs text-slate-500 text-center">把下方的碎片拖入上方的网格（支持任意格子摆放）</p>
            </div>

            <!-- Unified Workspace Coordinate Root -->
            <div id="game-workspace" class="relative flex-1 w-full flex flex-col items-center justify-start gap-6 min-h-[500px]">
                
                <!-- Target Board Grid -->
                <div id="puzzle-grid" class="relative bg-slate-100 border-2 border-slate-200 rounded-2xl shadow-inner transition-all duration-300 overflow-visible" style="width: 320px; height: 320px;">
                    <!-- Grid slots are dynamically calculated and absolute-positioned here -->
                </div>

                <!-- Scrap Tray containing scrambled tiles -->
                <div class="w-full flex-1 flex flex-col gap-2 mt-2 self-stretch min-h-[180px]">
                    <div class="flex items-center justify-between px-2 text-xs font-bold text-slate-400">
                        <span>待拼碎片堆 / Tray</span>
                        <button onclick="toggleHint()" class="text-emerald-600 hover:text-emerald-700 font-bold bg-emerald-50 px-2 py-1 rounded-md">
                            切换底图提示 (On/Off)
                        </button>
                    </div>
                    <!-- Responsive Shelf Tray -->
                    <div id="pieces-tray" class="relative bg-slate-50/70 rounded-2xl p-4 border border-slate-200 flex-1 min-h-[160px] overflow-visible">
                        <!-- Shuffled floating puzzle elements spawn inside here -->
                    </div>
                </div>
                
                <!-- Win Indicator banner -->
                <div id="game-status-msg" class="w-full text-center py-2.5 px-4 rounded-xl bg-emerald-50 text-emerald-700 text-xs font-semibold animate-pulse hidden">
                    🎉 拼图完美正确！你太棒了！
                </div>
            </div>
        </section>

    </main>

    <!-- Success Modal Dialog -->
    <div id="success-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 transition-opacity opacity-0 pointer-events-none">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl border border-slate-100 transform scale-95 transition-transform flex flex-col items-center gap-5">
            <div class="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center text-3xl animate-bounce">
                🌟
            </div>
            <div>
                <h3 class="text-2xl font-bold text-slate-900">太棒啦！</h3>
                <p class="text-sm text-slate-500 mt-2">你成功拼出了单字：<span class="font-extrabold text-slate-800" id="modal-word">漂</span></p>
            </div>
            <button onclick="closeModalAndNext()" class="w-full py-3 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-2xl shadow-lg shadow-emerald-200 transition-all flex items-center justify-center gap-2">
                继续学习下一个 ➔
            </button>
        </div>
    </div>

    <!-- Hidden canvas utilized dynamically for generating original word textures -->
    <canvas id="hidden-source-canvas" style="display:none;" width="360" height="360"></canvas>

    <script>
        // --- High Fidelity Single-Character Vocabulary Database ---
        const VOCABULARY = [
            { word: "漂", pinyin: "piào", meaning: "pretty (part of 漂亮)", emoji: "🌸", colors: ["#FFDEE9", "#B5FFFC"] },
            { word: "亮", pinyin: "liàng", meaning: "bright (part of 漂亮)", emoji: "✨", colors: ["#CAAFEF", "#ECF0F1"] },
            { word: "乖", pinyin: "guāi", meaning: "well-behaved", emoji: "🐱", colors: ["#FEE140", "#FA709A"] },
            { word: "又", pinyin: "yòu", meaning: "both... and... / again", emoji: "➕", colors: ["#84fab0", "#8fd3f4"] },
            { word: "高", pinyin: "gāo", meaning: "tall; high", emoji: "🦒", colors: ["#FFF1EB", "#ACE0F9"] },
            { word: "除", pinyin: "chú", meaning: "besides; except", emoji: "➖", colors: ["#a1c4fd", "#c2e9fb"] },
            { word: "以", pinyin: "yǐ", meaning: "with; take (part of 以外)", emoji: "🗺️", colors: ["#fbc2eb", "#a6c1ee"] },
            { word: "外", pinyin: "wài", meaning: "outside; outer", emoji: "🚪", colors: ["#cfd9df", "#e2ebf0"] },
            { word: "条", pinyin: "tiáo", meaning: "measure word (fish, long items)", emoji: "🎗️", colors: ["#FFE29F", "#FFA99F"] },
            { word: "里", pinyin: "lǐ", meaning: "inside; in", emoji: "📥", colors: ["#fed0c6", "#fecfef"] },
            { word: "金", pinyin: "jīn", meaning: "gold; golden", emoji: "🪙", colors: ["#F9D423", "#FF4E50"] },
            { word: "鱼", pinyin: "yú", meaning: "fish", emoji: "🐟", colors: ["#4facfe", "#00f2fe"] },
            { word: "游", pinyin: "yóu", meaning: "to swim / travel", emoji: "🏊", colors: ["#96fbc4", "#f9f586"] }
        ];

        let currentIndex = 0;
        let difficulty = 3; // Grid dimensions (2=2x2, 3=3x3, 4=4x4)
        let gridSlots = []; // Coordinate mapping for targets on Board
        let pieces = [];    // Active puzzle pieces state
        let showHint = false;

        // --- STREAMING_CHUNK:Setting up Audio synthesizer ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSynthSound(type) {
            initAudio();
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const now = audioCtx.currentTime;
            if (type === 'snap') {
                // Happy high bubble pop sound
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(587.33, now); // D5
                osc.frequency.exponentialRampToValueAtTime(1174.66, now + 0.08); // D6
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 0.08);
            } else if (type === 'win') {
                // Classic Asian pentatonic victory arpeggio
                const notes = [523.25, 587.33, 659.25, 783.99, 880.00, 1046.50]; // C5-D5-E5-G5-A5-C6
                notes.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, now + (i * 0.08));
                    gain.gain.setValueAtTime(0.12, now + (i * 0.08));
                    gain.gain.exponentialRampToValueAtTime(0.01, now + (i * 0.08) + 0.3);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now + i * 0.08);
                    osc.stop(now + i * 0.08 + 0.35);
                });
            }
        }

        // --- STREAMING_CHUNK:Integrating Web Speech TTS ---
        function speakCurrentWord() {
            const word = VOCABULARY[currentIndex].word;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(word);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.8;
                window.speechSynthesis.speak(utterance);
            }
        }

        // --- STREAMING_CHUNK:Configuring confetti engine ---
        const confettiCanvas = document.getElementById('confetti-canvas');
        const confettiCtx = confettiCanvas.getContext('2d');
        let confettiActive = false;
        let particles = [];

        function resizeConfettiCanvas() {
            confettiCanvas.width = confettiCanvas.parentElement.clientWidth;
            confettiCanvas.height = confettiCanvas.parentElement.clientHeight;
        }

        function createConfetti() {
            particles = [];
            const colors = ['#10b981', '#3b82f6', '#f59e0b', '#ec4899', '#8b5cf6', '#14b8a6'];
            for (let i = 0; i < 70; i++) {
                particles.push({
                    x: Math.random() * confettiCanvas.width,
                    y: confettiCanvas.height + Math.random() * 20,
                    vx: (Math.random() - 0.5) * 5,
                    vy: -Math.random() * 7 - 4,
                    r: Math.random() * 4 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 8
                });
            }
        }

        function updateAndRenderConfetti() {
            if (!confettiActive) return;
            confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            let alive = false;
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.16; // gravity
                p.rotation += p.rotationSpeed;
                if (p.y < confettiCanvas.height + 20) alive = true;

                confettiCtx.save();
                confettiCtx.translate(p.x, p.y);
                confettiCtx.rotate((p.rotation * Math.PI) / 180);
                confettiCtx.fillStyle = p.color;
                confettiCtx.fillRect(-p.r, -p.r, p.r * 2, p.r * 2);
                confettiCtx.restore();
            });

            if (alive) {
                requestAnimationFrame(updateAndRenderConfetti);
            } else {
                confettiActive = false;
                confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            }
        }

        function triggerConfetti() {
            resizeConfettiCanvas();
            confettiActive = true;
            createConfetti();
            updateAndRenderConfetti();
        }

        // --- STREAMING_CHUNK:Drawing dynamic character texture ---
        function drawTexture() {
            const vocab = VOCABULARY[currentIndex];
            const canvas = document.getElementById('hidden-source-canvas');
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;

            // Gradient bg
            const grad = ctx.createLinearGradient(0, 0, w, h);
            grad.addColorStop(0, vocab.colors[0]);
            grad.addColorStop(1, vocab.colors[1]);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, w, h);

            // Watermark Emoji
            ctx.font = '150px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.fillText(vocab.emoji, w / 2, h / 2);

            // Large scale single character font sizing (200px is perfect!)
            let fontSize = 200;

            ctx.font = `bold ${fontSize}px "PingFang SC", "Microsoft YaHei", "SF Pro", sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Arch tracing trace lines (Emerald Outline)
            ctx.strokeStyle = '#059669';
            ctx.lineWidth = 14;
            ctx.lineJoin = 'round';
            ctx.strokeText(vocab.word, w / 2, h / 2);

            // Bright green fill
            ctx.fillStyle = '#34d399';
            ctx.fillText(vocab.word, w / 2, h / 2);

            // Trace dashed helper
            ctx.strokeStyle = '#f0fdf4';
            ctx.lineWidth = 2.5;
            ctx.setLineDash([5, 5]);
            ctx.strokeText(vocab.word, w / 2, h / 2);
            ctx.setLineDash([]); // clear dash

            // Update Left Goal Thumbnail
            document.getElementById('word-preview-image').src = canvas.toDataURL();
        }

        function setDifficulty(diff) {
            difficulty = diff;
            [2, 3, 4].forEach(d => {
                const btn = document.getElementById(`btn-diff-${d}`);
                if (d === diff) {
                    btn.classList.add('bg-white', 'text-slate-800', 'shadow-sm');
                } else {
                    btn.classList.remove('bg-white', 'text-slate-800', 'shadow-sm');
                }
            });
            resetCurrentLevel();
        }

        function toggleHint() {
            showHint = !showHint;
            updateGridHint();
        }

        function updateGridHint() {
            const grid = document.getElementById('puzzle-grid');
            const canvas = document.getElementById('hidden-source-canvas');
            if (showHint) {
                grid.style.backgroundImage = `url(${canvas.toDataURL()})`;
                grid.style.backgroundSize = 'cover';
                grid.style.backgroundBlendMode = 'overlay';
                grid.style.backgroundColor = 'rgba(255, 255, 255, 0.55)';
            } else {
                grid.style.backgroundImage = 'none';
                grid.style.backgroundColor = '';
            }
        }

        // --- STREAMING_CHUNK:Initializing level architecture ---
        function initLevel() {
            const vocab = VOCABULARY[currentIndex];
            
            // Text values updates
            document.getElementById('word-pinyin').innerText = vocab.pinyin;
            document.getElementById('word-chars').innerText = vocab.word;
            document.getElementById('word-meaning').innerText = vocab.meaning;
            document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${VOCABULARY.length}`;
            document.getElementById('progress-bar').style.width = `${((currentIndex + 1) / VOCABULARY.length) * 100}%`;
            document.getElementById('game-status-msg').classList.add('hidden');

            drawTexture();
            updateGridHint();

            const grid = document.getElementById('puzzle-grid');
            const tray = document.getElementById('pieces-tray');
            const workspace = document.getElementById('game-workspace');

            // Clean old custom components
            grid.innerHTML = '';
            
            // Clear only dynamic piece elements inside workspace, keep tray and grid frameworks
            const oldPieces = workspace.querySelectorAll('.draggable-puzzle-piece');
            oldPieces.forEach(p => p.remove());

            const gridSize = 320; 
            const tileSize = gridSize / difficulty;

            gridSlots = [];
            pieces = [];

            // Calculate Grid slots bounding spaces relative to the shared GameWorkspace parent
            grid.style.gridTemplateColumns = `repeat(${difficulty}, 1fr)`;
            grid.style.display = 'grid';

            const canvas = document.getElementById('hidden-source-canvas');
            const tileSourceSize = canvas.width / difficulty;

            for (let row = 0; row < difficulty; row++) {
                for (let col = 0; col < difficulty; col++) {
                    const slotEl = document.createElement('div');
                    slotEl.className = "border border-slate-200/80 relative flex items-center justify-center text-slate-300 font-bold text-xs";
                    slotEl.style.width = `${tileSize}px`;
                    slotEl.style.height = `${tileSize}px`;
                    
                    // Simple grid guide index
                    const guideNum = document.createElement('span');
                    guideNum.innerText = `${row * difficulty + col + 1}`;
                    guideNum.className = "opacity-20 absolute inset-0 flex items-center justify-center select-none";
                    slotEl.appendChild(guideNum);

                    grid.appendChild(slotEl);

                    // Map absolute coords relative to game-workspace wrapper
                    gridSlots.push({
                        row,
                        col,
                        element: slotEl,
                        assignedPiece: null // Tracks current holding piece object
                    });

                    // Cut visual snippet for the pieces
                    const pieceCanvas = document.createElement('canvas');
                    pieceCanvas.width = tileSourceSize;
                    pieceCanvas.height = tileSourceSize;
                    const pCtx = pieceCanvas.getContext('2d');
                    pCtx.drawImage(
                        canvas,
                        col * tileSourceSize, row * tileSourceSize, tileSourceSize, tileSourceSize,
                        0, 0, tileSourceSize, tileSourceSize
                    );

                    const dataUrl = pieceCanvas.toDataURL();
                    pieces.push({
                        id: `p-${row}-${col}`,
                        correctRow: row,
                        correctCol: col,
                        dataUrl: dataUrl,
                        currentSlot: null, 
                        originalRotate: (Math.random() - 0.5) * 16, // random rotation for organic look
                        el: null // Bound element
                    });
                }
            }

            // Shuffle pieces and position them absolutely in workspace tray bounding rectangle
            const shuffled = [...pieces].sort(() => Math.random() - 0.5);

            // Wait a micro-tick for layout styles to calculate accurate heights
            setTimeout(() => {
                const workspaceRect = workspace.getBoundingClientRect();
                const trayRect = tray.getBoundingClientRect();
                
                shuffled.forEach((p, idx) => {
                    const pieceEl = document.createElement('div');
                    pieceEl.className = "draggable-puzzle-piece absolute rounded-xl shadow-md hover:shadow-lg cursor-grab active:cursor-grabbing border border-slate-200/50 bg-white z-20";
                    pieceEl.style.width = `${tileSize}px`;
                    pieceEl.style.height = `${tileSize}px`;
                    pieceEl.style.backgroundImage = `url(${p.dataUrl})`;
                    pieceEl.style.backgroundSize = 'cover';
                    pieceEl.style.touchAction = 'none'; // prevent touch scroll
                    pieceEl.style.transform = `rotate(${p.originalRotate}deg)`;

                    p.el = pieceEl;
                    workspace.appendChild(pieceEl);

                    // Distribute inside tray bounds
                    const margin = 10;
                    const usableW = trayRect.width - tileSize - margin * 2;
                    const usableH = trayRect.height - tileSize - margin * 2;

                    // Compute position relative to Game Workspace container
                    const trayRelLeft = trayRect.left - workspaceRect.left + margin;
                    const trayRelTop = trayRect.top - workspaceRect.top + margin;

                    // Organic spread layout distribution
                    const gridCols = Math.ceil(Math.sqrt(shuffled.length));
                    const colIdx = idx % gridCols;
                    const rowIdx = Math.floor(idx / gridCols);
                    
                    const cellW = usableW / gridCols;
                    const cellH = usableH / Math.ceil(shuffled.length / gridCols);

                    const randomX = trayRelLeft + (colIdx * cellW) + (Math.random() * (cellW - tileSize));
                    const randomY = trayRelTop + (rowIdx * cellH) + (Math.random() * (cellH - tileSize));

                    // Secure bounds check
                    const finalX = Math.max(trayRelLeft, Math.min(trayRelLeft + usableW, randomX));
                    const finalY = Math.max(trayRelTop, Math.min(trayRelTop + usableH, randomY));

                    pieceEl.style.left = `${finalX}px`;
                    pieceEl.style.top = `${finalY}px`;

                    makeDraggable(pieceEl, p);
                });
            }, 50);
        }

        // --- STREAMING_CHUNK:Configuring pointer-based drag logic ---
        function makeDraggable(el, pieceObj) {
            let startPointerX = 0;
            let startPointerY = 0;
            let startElLeft = 0;
            let startElTop = 0;
            let isDragging = false;

            el.addEventListener('pointerdown', (e) => {
                initAudio();
                e.preventDefault();
                isDragging = true;
                el.setPointerCapture(e.pointerId);

                // Elevate target visual hierarchy
                el.classList.add('z-30', 'shadow-2xl');
                el.classList.remove('transition-all', 'duration-300');
                el.style.transform = 'scale(1.08) rotate(0deg)'; // straight alignment while dragging

                // If piece was docked, remove it from that slot first to vacate it
                if (pieceObj.currentSlot) {
                    pieceObj.currentSlot.assignedPiece = null;
                    pieceObj.currentSlot = null;
                }

                // Fetch position bounds relative to its parent (game-workspace)
                const rect = el.getBoundingClientRect();
                const parentRect = el.parentElement.getBoundingClientRect();

                startPointerX = e.clientX;
                startPointerY = e.clientY;
                startElLeft = rect.left - parentRect.left;
                startElTop = rect.top - parentRect.top;
            });

            el.addEventListener('pointermove', (e) => {
                if (!isDragging) return;
                const dx = e.clientX - startPointerX;
                const dy = e.clientY - startPointerY;

                el.style.left = `${startElLeft + dx}px`;
                el.style.top = `${startElTop + dy}px`;
            });

            el.addEventListener('pointerup', (e) => {
                if (!isDragging) return;
                isDragging = false;
                el.releasePointerCapture(e.pointerId);

                el.classList.remove('z-30', 'shadow-2xl');
                el.style.transform = '';

                const workspace = document.getElementById('game-workspace');
                const grid = document.getElementById('puzzle-grid');
                const tray = document.getElementById('pieces-tray');

                const workspaceRect = workspace.getBoundingClientRect();
                const gridRect = grid.getBoundingClientRect();
                const trayRect = tray.getBoundingClientRect();

                // Compute exact absolute center of dropped element
                const pieceRect = el.getBoundingClientRect();
                const pieceCenter = {
                    x: pieceRect.left + pieceRect.width / 2,
                    y: pieceRect.top + pieceRect.height / 2
                };

                let snapped = false;
                const tileSize = gridRect.width / difficulty;

                // Threshold: Dropped center must fall inside the puzzle board boundaries
                if (
                    pieceCenter.x >= gridRect.left && pieceCenter.x <= gridRect.right &&
                    pieceCenter.y >= gridRect.top && pieceCenter.y <= gridRect.bottom
                ) {
                    // Find closest grid coordinate
                    const relativeX = pieceCenter.x - gridRect.left;
                    const relativeY = pieceCenter.y - gridRect.top;

                    const col = Math.floor(relativeX / tileSize);
                    const row = Math.floor(relativeY / tileSize);

                    // Locate designated slot
                    const slot = gridSlots.find(s => s.row === row && s.col === col);
                    if (slot) {
                        snapped = true;

                        // Swap Scenario: If slot is occupied by another piece, evict that piece back to the Tray
                        if (slot.assignedPiece && slot.assignedPiece !== pieceObj) {
                            const oldPiece = slot.assignedPiece;
                            oldPiece.currentSlot = null;
                            oldPiece.el.classList.add('transition-all', 'duration-300');
                            oldPiece.el.style.transform = `rotate(${oldPiece.originalRotate}deg)`;

                            // Move evicted piece organically to tray
                            const margin = 20;
                            const trayL = trayRect.left - workspaceRect.left + margin;
                            const trayT = trayRect.top - workspaceRect.top + margin;
                            const trayW = trayRect.width - tileSize - margin * 2;
                            const trayH = trayRect.height - tileSize - margin * 2;

                            const escapeX = trayL + Math.random() * trayW;
                            const escapeY = trayT + Math.random() * trayH;

                            oldPiece.el.style.left = `${escapeX}px`;
                            oldPiece.el.style.top = `${escapeY}px`;
                        }

                        // Dock current piece to slot
                        slot.assignedPiece = pieceObj;
                        pieceObj.currentSlot = slot;

                        // Calculate slot position relative to Workspace
                        const slotLeft = gridRect.left - workspaceRect.left + (col * tileSize);
                        const slotTop = gridRect.top - workspaceRect.top + (row * tileSize);

                        el.classList.add('transition-all', 'duration-300');
                        el.style.transform = 'rotate(0deg)'; // straight alignment
                        el.style.left = `${slotLeft}px`;
                        el.style.top = `${slotTop}px`;

                        playSynthSound('snap');
                        flashMatchedSlot(el);
                        checkWinCondition();
                    }
                }

                // If not dropped on board or not snapped correctly, keep inside tray boundaries
                if (!snapped) {
                    el.classList.add('transition-all', 'duration-300');
                    el.style.transform = `rotate(${pieceObj.originalRotate}deg)`;

                    let currentL = pieceRect.left - workspaceRect.left;
                    let currentT = pieceRect.top - workspaceRect.top;

                    const trayRelLeft = trayRect.left - workspaceRect.left;
                    const trayRelTop = trayRect.top - workspaceRect.top;

                    // Restrict dropped coordinates to Tray boundaries to prevent stray pieces
                    currentL = Math.max(trayRelLeft + 5, Math.min(trayRelLeft + trayRect.width - pieceRect.width - 5, currentL));
                    currentT = Math.max(trayRelTop + 5, Math.min(trayRelTop + trayRect.height - pieceRect.height - 5, currentT));

                    el.style.left = `${currentL}px`;
                    el.style.top = `${currentT}px`;
                }
            });
        }

        function flashMatchedSlot(el) {
            el.classList.add('pulse-active');
            setTimeout(() => {
                el.classList.remove('pulse-active');
            }, 600);
        }

        // --- STREAMING_CHUNK:Validating win conditions ---
        // Win Validator: Check if all slots have correct pieces assigned
        function checkWinCondition() {
            // All slots must have the correct pieces in them
            const isFinished = gridSlots.every(slot => {
                const p = slot.assignedPiece;
                return p !== null && p.correctRow === slot.row && p.correctCol === slot.col;
            });

            if (isFinished) {
                playSynthSound('win');
                triggerConfetti();
                
                document.getElementById('game-status-msg').classList.remove('hidden');
                
                // Show completion Modal
                setTimeout(() => {
                    const modal = document.getElementById('success-modal');
                    document.getElementById('modal-word').innerText = VOCABULARY[currentIndex].word;
                    modal.classList.remove('opacity-0', 'pointer-events-none');
                    modal.querySelector('div').classList.remove('scale-95');
                }, 800);
            }
        }

        function closeModalAndNext() {
            const modal = document.getElementById('success-modal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            modal.querySelector('div').classList.add('scale-95');
            nextWord();
        }

        function prevWord() {
            currentIndex = (currentIndex - 1 + VOCABULARY.length) % VOCABULARY.length;
            initLevel();
        }

        function nextWord() {
            currentIndex = (currentIndex + 1) % VOCABULARY.length;
            initLevel();
        }

        function resetCurrentLevel() {
            initLevel();
        }

        // Boot-Up
        window.onload = function() {
            initLevel();
            window.addEventListener('resize', () => {
                if (confettiActive) resizeConfettiCanvas();
            });
        }
    </script>
</body>
