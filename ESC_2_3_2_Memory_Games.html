<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESC_2_3_2_Memory_Games</title>
    <!-- Tailwind CSS for modern aesthetics -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Card flip 3D mechanics - Bulletproof Safari & Mobile support */
        .perspective-1000 {
            perspective: 1000px;
            -webkit-perspective: 1000px;
        }
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.2);
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d;
        }
        .card-flipped .card-inner {
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
        }
        .card-front, .card-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden; /* Critical prefix for iOS Safari */
            backface-visibility: hidden;
            border-radius: 1rem; /* rounded-2xl */
            overflow: hidden; /* Securely clip card edges here, NOT on the parent wrapper */
        }
        .card-back {
            z-index: 2;
            transform: rotateY(0deg);
            -webkit-transform: rotateY(0deg);
        }
        .card-front {
            z-index: 1;
            transform: rotateY(180deg);
            -webkit-transform: rotateY(180deg);
        }
        /* Custom card back spiral pattern mimicking the screenshot */
        .card-back-pattern {
            background-color: #2b5c8f;
            background-image: radial-gradient(circle, transparent 20%, #1e3f66 20%, #1e3f66 40%, transparent 40%, transparent 60%, #1e3f66 60%, #1e3f66 80%, transparent 80%, transparent);
            background-size: 16px 16px;
        }
    </style>
</head>
<body class="bg-amber-50 min-h-screen font-sans text-slate-800 flex flex-col select-none">

    <!-- Header Panel -->
    <header class="bg-amber-700/90 border-b-4 border-amber-800 py-4 px-6 sticky top-0 z-30 shadow-md backdrop-blur-sm">
        <div class="max-w-5xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-3 text-white">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-amber-400 rounded-xl flex items-center justify-center text-amber-950 font-bold text-xl shadow-inner">
                    🃏
                </div>
                <div>
                    <h1 class="text-xl font-black tracking-wide">ESC_2_3_2_Memory_Games</h1>
                    <p class="text-xs text-amber-200">Unit 1: Leisure 休闲 (记忆力词汇大作战)</p>
                </div>
            </div>
            
            <!-- Global Reset Button -->
            <button onclick="initGame()" class="px-4 py-2 bg-amber-500 hover:bg-amber-400 text-amber-950 font-black rounded-xl transition-all shadow-md active:scale-95 text-sm flex items-center gap-1.5 border-b-4 border-amber-600 active:border-b-0">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18"></path></svg>
                重新开始
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 max-w-5xl w-full mx-auto p-4 md:p-6 flex flex-col gap-6">

        <!-- Dashboard / Status Bar -->
        <section class="bg-amber-100/80 border-2 border-amber-200 p-4 rounded-2xl flex flex-col sm:flex-row gap-4 items-center justify-between text-slate-700 font-bold shadow-sm">
            <div class="flex items-center gap-6">
                <!-- Count-up timer -->
                <div class="flex items-center gap-2">
                    <span class="text-xs text-amber-800 uppercase tracking-wider">时间 / Time</span>
                    <span id="timer-text" class="text-xl font-black font-mono text-amber-950 bg-white px-3 py-1 rounded-lg border border-amber-200">00:00</span>
                </div>
                <!-- Progress Percentage -->
                <div class="flex items-center gap-2">
                    <span class="text-xs text-amber-800 uppercase tracking-wider">匹配进度 / Match</span>
                    <span id="progress-percent" class="text-xl font-black font-mono text-emerald-700 bg-white px-3 py-1 rounded-lg border border-amber-200">0%</span>
                </div>
            </div>
            <!-- Progress Bar Graphical representation -->
            <div class="w-full sm:w-1/3 bg-slate-200 h-3 rounded-full overflow-hidden border border-amber-200">
                <div id="progress-bar-fill" class="bg-emerald-500 h-full transition-all duration-300" style="width: 0%"></div>
            </div>
        </section>

        <!-- Dynamic Game Workspace Container -->
        <section class="bg-amber-900/10 border-4 border-amber-700/20 p-6 rounded-3xl min-h-[480px] flex flex-col items-center justify-center relative shadow-inner">
            <!-- Confetti Overlay -->
            <canvas id="confetti-canvas" class="absolute inset-0 pointer-events-none z-40 w-full h-full"></canvas>

            <!-- Active Card Matrix Grid (5 columns on desktop, 4 on mobile to accommodate 20 cards) -->
            <div id="card-grid" class="grid grid-cols-4 md:grid-cols-5 gap-3 md:gap-4 w-full max-w-3xl perspective-1000">
                <!-- Dynamic cards populated here -->
            </div>
        </section>

    </main>

    <!-- Victory Modal Dialog -->
    <div id="victory-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 transition-opacity opacity-0 pointer-events-none">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl border-4 border-amber-400 transform scale-95 transition-transform flex flex-col items-center gap-5">
            <div class="w-20 h-20 bg-amber-100 rounded-full flex items-center justify-center text-4xl animate-bounce">
                👑
            </div>
            <div>
                <h3 class="text-2xl font-black text-slate-900">太棒了，完美匹配！</h3>
                <p class="text-sm text-slate-500 mt-2">你成功完成了本课所有核心词汇的记忆挑战！</p>
                <div class="mt-4 bg-amber-50 p-3 rounded-xl border border-amber-100">
                    <p class="text-xs font-semibold text-amber-800">用时 / Duration</p>
                    <p id="modal-time-taken" class="text-2xl font-black text-amber-950">00:00</p>
                </div>
            </div>
            <button onclick="closeVictoryModal()" class="w-full py-3.5 bg-emerald-500 hover:bg-emerald-600 text-white font-black rounded-2xl shadow-lg shadow-emerald-200 transition-all flex items-center justify-center gap-2">
                再玩一次 ➔
            </button>
        </div>
    </div>

    <script>
        // --- 100% Extracted Words from ESC-2-3-WL2.jpg ---
        const VOCABULARY = [
            { id: 1, word: "干", pinyin: "gàn", meaning: "do" },
            { id: 2, word: "正", pinyin: "zhèng", meaning: "be doing" },
            { id: 3, word: "在", pinyin: "zài", meaning: "be doing (action in progress)" },
            { id: 4, word: "视", pinyin: "shì", meaning: "look; view" },
            { id: 5, word: "电视", pinyin: "diànshì", meaning: "television" },
            { id: 6, word: "节目", pinyin: "jiémù", meaning: "program" },
            { id: 7, word: "体育", pinyin: "tǐyù", meaning: "physical education" },
            { id: 8, word: "游戏", pinyin: "yóuxì", meaning: "game" },
            { id: 9, word: "电影", pinyin: "diànyǐng", meaning: "movie" },
            { id: 10, word: "时候", pinyin: "shíhou", meaning: "time" }
        ];

        let cards = [];
        let flippedCards = [];
        let isLockBoard = false;
        let matchedCount = 0;
        let timerInterval = null;
        let secondsElapsed = 0;

        // --- Web Audio Synthesizer Setup ---
        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const now = audioCtx.currentTime;
            
            if (type === 'flip') {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(450, now);
                osc.frequency.exponentialRampToValueAtTime(1000, now + 0.05);
                gain.gain.setValueAtTime(0.06, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 0.05);
            } else if (type === 'match') {
                // High double chime
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(523.25, now); // C5
                gain1.gain.setValueAtTime(0.08, now);
                gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc1.start(now);
                osc1.stop(now + 0.15);

                const osc2 = audioCtx.createOscillator();
                const gain2 = audioCtx.createGain();
                osc2.type = 'sine';
                osc2.frequency.setValueAtTime(659.25, now + 0.07); // E5
                gain2.gain.setValueAtTime(0.08, now + 0.07);
                gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.22);
                osc2.connect(gain2);
                gain2.connect(audioCtx.destination);
                osc2.start(now + 0.07);
                osc2.stop(now + 0.22);
            } else if (type === 'error') {
                // Mismatch buzz sound
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(160, now);
                osc.frequency.setValueAtTime(120, now + 0.12);
                gain.gain.setValueAtTime(0.12, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.18);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now);
                osc.stop(now + 0.18);
            } else if (type === 'win') {
                const notes = [523.25, 587.33, 659.25, 783.99, 880.00, 1046.50];
                notes.forEach((freq, idx) => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + idx * 0.08);
                    gain.gain.setValueAtTime(0.08, now + idx * 0.08);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + idx * 0.08 + 0.25);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(now + idx * 0.08);
                    osc.stop(now + idx * 0.08 + 0.25);
                });
            }
        }

        // --- TTS Standard voice reader ---
        function speakWord(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'zh-CN';
                utterance.rate = 0.8;
                window.speechSynthesis.speak(utterance);
            }
        }

        // --- Confetti particle engine ---
        const confettiCanvas = document.getElementById('confetti-canvas');
        const confettiCtx = confettiCanvas.getContext('2d');
        let confettiActive = false;
        let particles = [];

        function resizeConfettiCanvas() {
            confettiCanvas.width = confettiCanvas.parentElement.clientWidth;
            confettiCanvas.height = confettiCanvas.parentElement.clientHeight;
        }

        function createConfetti() {
            particles = [];
            const colors = ['#f59e0b', '#10b981', '#3b82f6', '#ec4899', '#8b5cf6'];
            for (let i = 0; i < 60; i++) {
                particles.push({
                    x: Math.random() * confettiCanvas.width,
                    y: confettiCanvas.height + Math.random() * 20,
                    vx: (Math.random() - 0.5) * 6,
                    vy: -Math.random() * 8 - 4,
                    r: Math.random() * 4 + 3,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 10
                });
            }
        }

        function updateAndRenderConfetti() {
            if (!confettiActive) return;
            confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            let alive = false;
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.16; // gravity
                p.rotation += p.rotationSpeed;
                if (p.y < confettiCanvas.height + 20) alive = true;

                confettiCtx.save();
                confettiCtx.translate(p.x, p.y);
                confettiCtx.rotate((p.rotation * Math.PI) / 180);
                confettiCtx.fillStyle = p.color;
                confettiCtx.fillRect(-p.r, -p.r, p.r * 2, p.r * 2);
                confettiCtx.restore();
            });

            if (alive) {
                requestAnimationFrame(updateAndRenderConfetti);
            } else {
                confettiActive = false;
                confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            }
        }

        function triggerConfetti() {
            resizeConfettiCanvas();
            confettiActive = true;
            createConfetti();
            updateAndRenderConfetti();
        }

        // --- Timer Controller ---
        function startTimer() {
            clearInterval(timerInterval);
            secondsElapsed = 0;
            document.getElementById('timer-text').innerText = "00:00";
            timerInterval = setInterval(() => {
                secondsElapsed++;
                const mins = String(Math.floor(secondsElapsed / 60)).padStart(2, '0');
                const secs = String(secondsElapsed % 60).padStart(2, '0');
                document.getElementById('timer-text').innerText = `${mins}:${secs}`;
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
        }

        // --- Game Setup Engine ---
        function initGame() {
            stopTimer();
            startTimer();

            matchedCount = 0;
            flippedCards = [];
            isLockBoard = false;

            // Reset progress
            document.getElementById('progress-percent').innerText = "0%";
            document.getElementById('progress-bar-fill').style.width = "0%";

            // Play with all 10 words (20 cards total)
            cards = [];
            VOCABULARY.forEach(v => {
                // Card 1: Chinese Card
                cards.push({
                    id: `card-zh-${v.id}`,
                    pairId: v.id,
                    type: 'zh',
                    content: v.word,
                    pinyin: v.pinyin,
                    matched: false
                });
                // Card 2: English Card
                cards.push({
                    id: `card-en-${v.id}`,
                    pairId: v.id,
                    type: 'en',
                    content: v.meaning,
                    matched: false
                });
            });

            // Scramble Card deck
            cards.sort(() => Math.random() - 0.5);

            // Populate Card Grid DOM
            const grid = document.getElementById('card-grid');
            grid.innerHTML = '';

            cards.forEach(c => {
                const cardEl = document.createElement('div');
                // Ensure proper touch target layout & full responsive scale
                cardEl.className = "w-full aspect-[4/5] relative select-none cursor-pointer active:scale-95 transition-transform duration-150";
                cardEl.id = c.id;

                // 3D Flipping structure with inner container and front/back faces
                cardEl.innerHTML = `
                    <div class="card-inner w-full h-full relative rounded-2xl shadow-md border border-amber-800/10">
                        
                        <!-- Card Back face -->
                        <div class="card-back card-back-pattern w-full h-full flex items-center justify-center">
                            <!-- Premium ornamental spiral decoration mimicking screenshot -->
                            <div class="w-10 h-10 rounded-full border-4 border-amber-300/40 flex items-center justify-center">
                                <span class="text-amber-200/50 text-base">★</span>
                            </div>
                        </div>

                        <!-- Card Front face (Revealed content) -->
                        <div class="card-front w-full h-full flex flex-col items-center justify-center p-2 text-center bg-sky-100 border-2 border-sky-400">
                            ${c.type === 'zh' ? `
                                <span class="text-[10px] md:text-xs font-black text-sky-600 font-mono tracking-wider">${c.pinyin}</span>
                                <span class="text-2xl md:text-3xl font-black text-sky-900 tracking-wide mt-1">${c.content}</span>
                                <span class="absolute right-2 bottom-1.5 text-[10px] opacity-40">🔊</span>
                            ` : `
                                <span class="text-[9px] md:text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">English</span>
                                <span class="text-sm md:text-base font-black text-indigo-950 leading-tight">${c.content}</span>
                            `}
                        </div>

                    </div>
                `;

                // Single Unified event trigger
                cardEl.addEventListener('click', () => handleCardClick(cardEl, c));
                grid.appendChild(cardEl);
            });
        }

        // --- Responsive Interactive Handlers ---
        function handleCardClick(el, cardObj) {
            if (isLockBoard) return;
            if (cardObj.matched) return;
            // Prevent double-clicking the exact same flipped card
            if (flippedCards.some(f => f.data.id === cardObj.id)) return;

            initAudio();

            // 1. Instantly apply CSS 3D flipped state to the active element
            el.classList.add('card-flipped');
            playSound('flip');

            // Standard pronunciation readouts
            if (cardObj.type === 'zh') {
                speakWord(cardObj.content);
            }

            // Queue up cards
            flippedCards.push({ el, data: cardObj });

            // 2. Perform comparison matching if two cards are flipped face up
            if (flippedCards.length === 2) {
                isLockBoard = true; // Freeze further clicks
                checkMatch();
            }
        }

        // --- Core Snapping Matching State Machine ---
        function checkMatch() {
            const [c1, c2] = flippedCards;

            if (c1.data.pairId === c2.data.pairId) {
                // MATCH SCENARIO!
                // Wait briefly for the 3D flip animation to finish rendering completely
                setTimeout(() => {
                    c1.data.matched = true;
                    c2.data.matched = true;

                    // Apply successful highlight styling
                    const c1Front = c1.el.querySelector('.card-front');
                    const c2Front = c2.el.querySelector('.card-front');

                    c1Front.className = "card-front w-full h-full rounded-2xl flex flex-col items-center justify-center p-2 text-center transition-all bg-emerald-100 border-4 border-emerald-500 shadow-inner";
                    c2Front.className = "card-front w-full h-full rounded-2xl flex flex-col items-center justify-center p-2 text-center transition-all bg-emerald-100 border-4 border-emerald-500 shadow-inner";

                    matchedCount++;
                    
                    // Update progress tracker
                    const totalPairs = VOCABULARY.length;
                    const percent = Math.floor((matchedCount / totalPairs) * 100);
                    document.getElementById('progress-percent').innerText = `${percent}%`;
                    document.getElementById('progress-bar-fill').style.width = `${percent}%`;

                    playSound('match');

                    flippedCards = [];
                    isLockBoard = false; // Immediately unlock board for other matches

                    if (matchedCount === totalPairs) {
                        handleVictory();
                    }
                }, 500);
            } else {
                // MISMATCH SCENARIO!
                // Give user a brief moment to see both card values at the same time
                setTimeout(() => {
                    playSound('error');
                    
                    // Flash red warning borders to front cards
                    const c1Front = c1.el.querySelector('.card-front');
                    const c2Front = c2.el.querySelector('.card-front');
                    c1Front.classList.add('border-red-500', 'bg-red-50');
                    c2Front.classList.add('border-red-500', 'bg-red-50');

                    // Both stay flipped face-up for 1.2s, then turn face-down simultaneously
                    setTimeout(() => {
                        c1.el.classList.remove('card-flipped');
                        c2.el.classList.remove('card-flipped');

                        // Reset color styles after they rotate back down
                        setTimeout(() => {
                            c1Front.classList.remove('border-red-500', 'bg-red-50');
                            c2Front.classList.remove('border-red-500', 'bg-red-50');
                        }, 300);

                        flippedCards = [];
                        isLockBoard = false; // Unlock gameboard interaction
                    }, 1200); // Perfect duration to observe and memorize the mismatch

                }, 500);
            }
        }

        function handleVictory() {
            stopTimer();
            playSound('win');
            triggerConfetti();

            const finalTime = document.getElementById('timer-text').innerText;
            document.getElementById('modal-time-taken').innerText = finalTime;

            // Pop modal panel
            setTimeout(() => {
                const modal = document.getElementById('victory-modal');
                modal.classList.remove('opacity-0', 'pointer-events-none');
                modal.querySelector('div').classList.remove('scale-95');
            }, 800);
        }

        function closeVictoryModal() {
            const modal = document.getElementById('victory-modal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            modal.querySelector('div').classList.add('scale-95');
            initGame(); // Rebuild and shuffle
        }

        // Boot-Up
        window.onload = function() {
            initGame();
            window.addEventListener('resize', () => {
                if (confettiActive) resizeConfettiCanvas();
            });
        }
    </script>
</body>
</html>
