```html
<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>中文小游戏入口</title>

  <style>
    :root{
      --bg:#070a12;
      --panel:#0e1630;
      --card:#101b3d;
      --border:rgba(255,255,255,.14);
      --text:#f2f5ff;
      --muted:rgba(242,245,255,.72);
      --accent:#ffd54a;
      --btn:#26c6da;
      --btn2:#7c4dff;
      --shadow:0 18px 60px rgba(0,0,0,.55);
      --r:18px;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;

      font-family:
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        Roboto,
        Helvetica,
        Arial,
        "Noto Sans",
        sans-serif;

      color:var(--text);

      background:
        radial-gradient(
          1000px 700px at 15% 0%,
          #223a86 0%,
          #0b1430 45%,
          var(--bg) 100%
        );

      min-height:100vh;
      padding:18px 14px 34px;
    }

    .wrap{
      max-width:1100px;
      margin:0 auto;
    }

    .top{
      background:
        linear-gradient(
          180deg,
          rgba(255,255,255,.08),
          rgba(255,255,255,.04)
        );

      border:1px solid var(--border);
      border-radius:20px;
      padding:16px;
      box-shadow:var(--shadow);

      display:flex;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    h1{
      margin:0;
      font-size:20px;
      letter-spacing:.2px;
    }

    .sub{
      margin:5px 0 0;
      color:var(--muted);
      font-size:12.5px;
    }

    .grid{
      margin-top:14px;

      display:grid;
      grid-template-columns:repeat(4, minmax(220px, 1fr));
      gap:12px;
    }

    @media (max-width:980px){
      .grid{
        grid-template-columns:repeat(2, minmax(220px, 1fr));
      }
    }

    @media (max-width:620px){
      .grid{
        grid-template-columns:1fr;
      }
    }

    .card{
      background:
        linear-gradient(
          180deg,
          rgba(255,255,255,.06),
          rgba(0,0,0,.12)
        );

      border:1px solid var(--border);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:14px 14px 12px;

      display:flex;
      flex-direction:column;
      gap:10px;

      min-height:120px;
    }

    .unit{
      display:inline-flex;
      align-items:center;
      gap:8px;

      font-size:12px;
      font-weight:800;
      color:rgba(255,255,255,.85);
      letter-spacing:.2px;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:999px;

      background:var(--accent);
      box-shadow:0 0 0 3px rgba(255,213,74,.18);

      flex:0 0 auto;
    }

    .title{
      margin:0;
      font-size:18px;
      font-weight:950;
      letter-spacing:.2px;
      line-height:1.2;
    }

    .btnrow{
      margin-top:auto;
    }

    .btn{
      display:inline-flex;
      width:100%;

      justify-content:center;
      align-items:center;

      padding:11px 12px;
      border-radius:14px;

      font-weight:950;
      text-decoration:none;
      color:#061018;

      background:
        linear-gradient(
          90deg,
          var(--btn),
          #80deea
        );

      border:1px solid rgba(255,255,255,.10);
      box-shadow:0 12px 30px rgba(0,0,0,.35);

      transition:
        transform .12s,
        filter .12s;

      cursor:pointer;
    }

    .btn:hover{
      filter:brightness(1.05);
    }

    .btn:active{
      transform:translateY(1px);
    }

    .bar{
      height:4px;
      border-radius:999px;

      background:
        linear-gradient(
          90deg,
          var(--btn2),
          var(--accent)
        );

      opacity:.95;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <div class="top">
      <div>
        <h1>中文小游戏入口</h1>

        <p class="sub">
          点击“进入游戏”，游戏会自动在新窗口打开。
        </p>
      </div>
    </div>

    <div class="grid" id="grid"></div>

  </div>

  <script>
    const GAMES = [

      {
        unit:"ESC-2-2",
        title:"Hobbies 爱好｜苍蝇拍游戏（Word List 1）",
        file:"ESC_2_2_WL1.html"
      },

      {
        unit:"ESC-2-2",
        title:"Hobbies 爱好｜大鱼吃小鱼（Word List 2）",
        file:"ESC_2_2_WL2.html"
      },

      {
        unit:"ESC-2-6",
        title:"汉字拼拼乐（生病单元词汇）",
        file:"ESC_2_6.html"
      },

      {
        unit:"ESC-2-14",
        title:"Furniture Jeopardy（WL1 + WL2）",
        file:"ESC_2_14.html"
      },

      {
        unit:"ESC-2-14",
        title:"Sentence Unscramble（Text 1 + Text 2）",
        file:"ESC_2_14_unscramble.html"
      },

      {
        unit:"ESC-2-15",
        title:"Neighborhood Jeopardy（Lesson 6 Spiral Review）",
        file:"ESC_2_15.html"
      },

      {
        unit:"ESC-3-15",
        title:"Technology Wheels（WL1 / Final Version）",
        file:"ESC-3-15-tech-final.html"
      },

      {
        unit:"ESC-3-15",
        title:"Technology Wheels（WL2 / Tech 2 Version）",
        file:"ESC-3-15-tech-2.html"
      }

    ];

    const grid = document.getElementById("grid");

    const base = new URL("./", location.href).href;

    function esc(text){
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function createCard(game){
      const url = base + game.file;

      return `
        <div class="card">

          <div class="bar"></div>

          <div class="unit">
            <span class="dot"></span>
            ${esc(game.unit)}
          </div>

          <h2 class="title">
            ${esc(game.title)}
          </h2>

          <div class="btnrow">
            <a
              class="btn"
              href="${esc(url)}"
              target="_blank"
              rel="noopener"
            >
              进入游戏
            </a>
          </div>

        </div>
      `;
    }

    grid.innerHTML = GAMES
      .map(createCard)
      .join("");
  </script>
</body>
</html>
```
